<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patitas Felices</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icon/favicon-16x16.png">
</head>

<body>
    <header>
        <div class="logo">
            <img src="assets/logo.jpg" alt="Logo de gato junto a un perro">
            <h1>Patitas Felices</h1>
        </div>
        <nav>
            <ul class="box-btn">
                <li><a class="btn-default" href="index.html">Inicio</a></li>
                <li><a class="btn-default" href="catalogo-animales.html">Adoptar</a></li>
                <li><a class="btn-default" href="formulario-contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="contacto-container">
            <h2 class="section-title">Contáctanos</h2>

            <form class="form-contacto">
                <div class="campo">
                    <label for="nombre">Nombre *</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div class="campo">
                    <label for="apellidos">Apellidos *</label>
                    <input type="text" id="apellidos" name="apellidos" required>
                </div>

                <div class="campo">
                    <label for="ciudad">Ciudad *</label>
                    <input type="text" id="ciudad" name="ciudad" required>
                </div>

                <div class="campo">
                    <label for="email">Correo electrónico *</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="campo">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono">
                </div>

                <div class="campo">
                    <label for="tipo">Tipo de consulta *</label>
                    <select id="tipo" name="tipo" required>
                        <option value="">Seleccione una opción...</option>
                        <option value="adopcion">Adopción</option>
                        <option value="donacion">Donación</option>
                        <option value="voluntariado">Voluntariado</option>
                        <option value="general">Información general</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="mensaje">Mensaje *</label>
                    <textarea id="mensaje" name="mensaje" required></textarea>
                </div>
                <div class="campo">
                    <button class="btn-submit" type="submit">Enviar</button>
                </div>
            </form>

            <div class="info-directa">
                <h3>Información adicional</h3>
                <p>Email: contacto@ejemplo.com</p>
                <p>Teléfono: +57 123 456 789</p>
                <div class="redes">
                    <a href="#">Facebook</a> | <a href="#">Instagram</a>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; Fundacion patitas felices (2026).</p>
        <p>Derechos reservados</p>
        <p>Contacto: <a href="mailto:contacto@patitas.com">contacto@patitas.com</a></p>
        <p>Desarrollador: <a href="https://github.com/nok03m">nok03m</a></p>
    </footer>
</body>

</html>
